# GoReleaser config for gophermind — signed + notarized macOS binary,
# distributed via a Homebrew cask. Run releases locally on a Mac (see
# docs/RELEASING.md). Validate with `goreleaser check`.
version: 2
project_name: gophermind

before:
  hooks:
    - go mod tidy

builds:
  - id: gophermind
    main: ./cmd/gophermind
    binary: gophermind
    env:
      - CGO_ENABLED=0
    goos: [darwin, linux, windows]
    goarch: [amd64, arm64]
    mod_timestamp: "{{ .CommitTimestamp }}"
    ldflags:
      - -s -w
      - -X gophermind/internal/version.Version={{ .Version }}
      - -X gophermind/internal/version.Commit={{ .ShortCommit }}
      - -X gophermind/internal/version.Date={{ .CommitDate }}

# Merge the two arches into one universal binary, then code-sign it with a
# Developer ID Application identity (hardened runtime + secure timestamp). The
# identity is read from the environment so it never lives in this public repo.
universal_binaries:
  - id: gophermind
    replace: true
    hooks:
      # codesign.sh reads $MACOS_SIGN_IDENTITY itself and no-ops when it is unset,
      # so a credential-free `--snapshot` build still succeeds (this hook is NOT
      # covered by --skip=sign).
      post: ./scripts/codesign.sh "{{ .Path }}"

archives:
  - id: gophermind
    ids: [gophermind]
    # Predictable names the npm postinstall downloader relies on. The macOS
    # universal binary is "<name>_<version>_darwin_all.tar.gz".
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

# Notarization is NOT done here (GoReleaser's `signs` always registers a .sig
# artifact, which doesn't fit an in-place notarize). The macOS binary is
# codesigned in the universal_binaries hook above; `make release` notarizes the
# published darwin archive afterward via scripts/notarize.sh — the archive's
# binary is byte-identical, so Apple's hash registration still validates it.

homebrew_casks:
  - name: gophermind
    ids: [gophermind]
    binaries:
      - gophermind
    repository:
      owner: jbrahy
      name: homebrew-tap
    homepage: "https://github.com/jbrahy/gophermind.com"
    description: "A minimal agentic coding harness for OpenAI-compatible LLMs"
    license: MIT
    # Belt-and-suspenders: strip the quarantine xattr on install. The binary is
    # already signed + notarized, so this just guarantees no first-run prompt.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/gophermind"]
          end

release:
  github:
    owner: jbrahy
    name: gophermind.com
