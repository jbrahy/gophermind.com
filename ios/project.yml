name: GopherMind
options:
  bundleIdPrefix: com.jbrahy
  deploymentTarget:
    iOS: "17.0"

settings:
  base:
    SWIFT_VERSION: "6.0"

targets:
  GopherMind:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: GopherMind
    info:
      path: Generated/GopherMind-Info.plist
      properties:
        CFBundleDisplayName: GopherMind
        # ATS exception: lets the app reach a LAN/Tailscale http server during dev.
        # For remote use, prefer https/Tailscale — see docs/mobile-serve.md.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        # URL scheme reserved for later deep-linking (A5). Not wired up yet.
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - gophermind
            CFBundleURLName: com.jbrahy.gophermind
        UILaunchScreen: {}
    settings:
      base:
        # NOTE: bundle id must match the APNs GOPHERMIND_APNS_BUNDLE_ID env var
        # and the user's provisioning profile (see docs/mobile-serve.md, A5).
        PRODUCT_BUNDLE_IDENTIFIER: com.jbrahy.gophermind
        TARGETED_DEVICE_FAMILY: "1,2"
    scheme:
      testTargets:
        - GopherMindTests

  GopherMindTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: GopherMindTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
    dependencies:
      - target: GopherMind
